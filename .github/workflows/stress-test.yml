name: Stress Test on Deployment

on:
  workflow_run:
    workflows: ["Build and Push to AWS ECR"]
    types:
      - completed
  workflow_dispatch:  # Manual trigger for testing

jobs:
  stress-test:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install Flask psutil requests

      - name: Start Flask application
        run: |
          python app.py > app.log 2>&1 &
          sleep 3
          echo "Flask app started"

      - name: Run stress test
        run: |
          python -c "
          import requests
          import time
          import json
          
          BASE_URL = 'http://localhost:5000'
          
          print('🔥 Starting Aegis Stress Test Demo...')
          print('=' * 60)
          
          # Get baseline
          baseline = requests.get(f'{BASE_URL}/status').json()
          print(f'Baseline CPU: {baseline[\"system\"][\"cpu_usage_percent\"]}%')
          print(f'Baseline Memory: {baseline[\"system\"][\"memory_usage_percent\"]}%')
          print()
          
          # Trigger stress test
          print('📊 Triggering stress test...')
          response = requests.post(
              f'{BASE_URL}/stress-test',
              json={'duration': 10, 'concurrency': 50}
          )
          print(f'Initial CPU: {response.json()[\"initial_cpu\"]}%')
          print(f'Initial Memory: {response.json()[\"initial_memory_percent\"]}%')
          print()
          
          # Monitor during stress
          print('⏱️  Monitoring during stress...')
          for i in range(1, 6):
              time.sleep(2)
              status = requests.get(f'{BASE_URL}/status').json()
              cpu = status['system']['cpu_usage_percent']
              mem = status['system']['memory_usage_percent']
              print(f'  Interval {i}: CPU {cpu}% | Memory {mem}%')
          
          # Final status with alerts
          print()
          print('🚨 Aegis Detects Issues:')
          status = requests.get(f'{BASE_URL}/status').json()
          if status['alerts']:
              for alert in status['alerts']:
                  print(f\"  [{alert['severity']}] {alert['message']}\")
          else:
              print('  No alerts')
          
          print()
          print('✅ Stress test complete')
          print('=' * 60)
          "

      - name: View application logs
        if: always()
        run: |
          echo "=== Flask Application Logs ==="
          tail -50 app.log

      - name: Test Aegis error detection
        run: |
          python -c "
          import requests
          import json
          
          BASE_URL = 'http://localhost:5000'
          
          print('🧪 Testing Error Injection for Aegis Agents...')
          print('=' * 60)
          print()
          
          # Test 1: Memory Leak
          print('Test 1: Memory Leak Detection')
          requests.post(f'{BASE_URL}/inject-error/memory_leak')
          status = requests.get(f'{BASE_URL}/status').json()
          print(f'  ✓ Memory leak injected')
          print(f'  → Aegis should trigger: Service restart or ECS scale-up')
          requests.post(f'{BASE_URL}/clear-error/all')
          print()
          
          # Test 2: Dependency Error
          print('Test 2: Dependency Error Detection')
          requests.post(f'{BASE_URL}/inject-error/dependency_missing')
          resp = requests.get(f'{BASE_URL}/missing-dependency')
          print(f'  ✓ Dependency error injected (HTTP {resp.status_code})')
          print(f'  → Aegis should trigger: Redockerize with updated requirements.txt')
          requests.post(f'{BASE_URL}/clear-error/all')
          print()
          
          # Test 3: Connection Timeout
          print('Test 3: Connection Timeout Detection')
          requests.post(f'{BASE_URL}/inject-error/connection_timeout')
          print(f'  ✓ Connection timeout injected')
          print(f'  → Aegis should trigger: Database restart or reconnection logic')
          requests.post(f'{BASE_URL}/clear-error/all')
          print()
          
          print('=' * 60)
          print('All error scenarios tested successfully!')
          "

      - name: Generate test report
        if: always()
        run: |
          cat > stress_test_report.md << 'EOF'
          # Aegis DevOps Stress Test Report
          
          ## Test Execution
          - **Timestamp**: $(date)
          - **Status**: ✅ Completed
          
          ## Scenarios Tested
          1. ✅ High CPU/Memory Load (Stress Test)
          2. ✅ Memory Leak Detection
          3. ✅ Dependency Error Detection
          4. ✅ Connection Timeout Detection
          
          ## Expected Aegis Agent Responses
          - **AWS Agent**: Scales ECS instances, restarts tasks
          - **GitHub Agent**: Redockerizes image, pushes to ECR, updates deployment
          - **Orchestrator**: Routes to correct agent based on error type
          
          ## Next Steps
          - Monitor CloudWatch logs for agent actions
          - Verify ECS task scaling
          - Confirm Docker image rebuild and deployment
          EOF
          cat stress_test_report.md
